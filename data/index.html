<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate, max-age=0"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Pocket Chatroom</title>
    <meta
      name="description"
      content="Offline chatroom running directly on the ESP8266 captive portal."
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <h1>Pocket Chatroom</h1>
        <p class="hero-copy">
          A local chatroom for everyone connected to this Wi-Fi access point.
        </p>
        <p id="history-note" class="muted history-note"></p>
        <div class="pill-row">
          <span class="pill">No internet</span>
          <span class="pill">No cloud</span>
          <span class="pill">No external connections</span>
        </div>
      </section>

      <input
        id="hidden"
        name="hidden"
        type="text"
        readonly
        tabindex="-1"
        aria-hidden="true"
      />

      <section class="chat-card">
        <div class="chat-toolbar">
          <div>
            <h2>Public Chatroom</h2>
            <p id="connection-status" class="muted">Connecting ...</p>
          </div>
        </div>

        <div id="messages" class="messages" aria-live="polite"></div>

        <div class="composer-divider" aria-hidden="true"></div>

        <form id="chat-form" class="composer">
          <label class="input-group">
            <span>Username</span>
            <input
              id="username"
              name="user"
              type="text"
              maxlength="24"
              value="Anonymous"
              autocomplete="nickname"
            />
          </label>

          <label class="input-group">
            <span>Message</span>
            <textarea
              id="message"
              name="msg"
              maxlength="200"
              placeholder="Say something to the room ..."
              required
            ></textarea>
          </label>

          <div class="composer-footer">
            <p id="message-count" class="muted">0 / 200</p>
            <button id="send-button" type="submit">Send</button>
          </div>
        </form>
      </section>

      <footer class="site-footer" aria-label="Project credit">
        <div class="footer-badge">
          <svg
            class="github-mark"
            viewBox="0 0 16 16"
            aria-hidden="true"
            focusable="false"
          >
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52
              -.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2
              -3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.5
              7.5 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82
              2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2
              0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
            ></path>
          </svg>
          <span>bobmullut/pocket-chatroom</span>
        </div>
      </footer>
    </main>

    <template id="message-template">
      <article class="message">
        <div class="message-header">
          <strong class="message-user"></strong>
          <span class="message-time"></span>
        </div>
        <p class="message-body"></p>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
